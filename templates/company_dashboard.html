<!DOCTYPE html>
<html>
<head>
    <title>Company Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.box{border:1px solid #ccc;padding:15px;margin-bottom:20px;}</style>
</head>
<body class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Welcome, {{comp.name}}</h4>
        <a href="/" class="btn btn-sm btn-outline-danger">logout</a>
    </div>

    <div class="box">
        <div class="d-flex justify-content-between mb-3">
            <h6>Upcoming Drives</h6>
            <a href="/company/create_drive/{{user_id}}" class="btn btn-sm btn-success">Create Drive</a>
        </div>
        <table class="table table-sm">
            <thead><tr><th>ID</th><th>Drive Name</th><th class="text-end">Actions</th></tr></thead>
            <tbody>
                {% for d in active %}
                <tr>
                    <td>{{d.id}}</td>
                    <td>{{d.job_title}}</td>
                    <td class="text-end">
                        <a href="/company/view_applicants/{{d.id}}/{{user_id}}" class="btn btn-sm btn-outline-primary">view details</a>
                        <a href="/company/close_drive/{{d.id}}/{{user_id}}" class="btn btn-sm btn-outline-success">mark as complete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="box text-muted">
        <h6>Closed Drives</h6>
        <table class="table table-sm">
            <tbody>
                {% for d in closed %}
                <tr><td>{{d.id}}</td><td>{{d.job_title}}</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
